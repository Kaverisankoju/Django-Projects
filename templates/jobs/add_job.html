{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-8">

<div class="card shadow p-4">

<h2 class="mb-4">Post New Job</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" class="form-control mb-3" placeholder="Job Title">
     <input type="text" name="company" class="form-control mb-3" placeholder="Company Name">

    <textarea name="description" class="form-control mb-3" placeholder="Job Description"></textarea>

    <input type="text" name="location" class="form-control mb-3" placeholder="Location">

    <input type="text" name="salary" class="form-control mb-3" placeholder="Salary">

    <button type="submit" class="btn btn-warning w-100">Post Job</button>
</form>

</div>
</div>
</div>

{% endblock %}
