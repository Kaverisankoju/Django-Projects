
{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">
                Register
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Username">

                </div>

                <div class="mb-3">

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Password">

                </div>

                <div class="mb-3">

                    <select name="role"
                            class="form-control">

                        <option value="jobseeker">
                            Job Seeker
                        </option>

                        <option value="recruiter">
                            Recruiter
                        </option>

                    </select>

                </div>

                <button type="submit"
                        class="btn btn-primary w-100">

                    Register

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
